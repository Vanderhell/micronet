name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  repo-guard:
    name: Repository guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository guard
        shell: pwsh
        run: ./tools/repo_guard.ps1

  windows-msvc:
    name: Windows MSVC ${{ matrix.build_type }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DP2P_BUILD_TESTS=ON
          -DP2P_BUILD_EXAMPLES=OFF
          -DP2P_UART_DEBUG=OFF
          -DMICRONET_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --parallel --config ${{ matrix.build_type }}

      - name: Run tests
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  windows-clangcl:
    name: Windows ClangCL Debug
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DCMAKE_BUILD_TYPE=Debug
          -DP2P_BUILD_TESTS=ON
          -DP2P_BUILD_EXAMPLES=OFF
          -DP2P_UART_DEBUG=OFF
          -DMICRONET_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux:
    name: Ubuntu ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang

      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DP2P_BUILD_TESTS=ON
          -DP2P_BUILD_EXAMPLES=OFF
          -DP2P_UART_DEBUG=OFF
          -DMICRONET_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux-strict:
    name: Ubuntu GCC strict Debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure
        env:
          CC: gcc
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DP2P_BUILD_TESTS=ON
          -DP2P_BUILD_EXAMPLES=OFF
          -DP2P_UART_DEBUG=OFF
          -DMICRONET_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux-chat:
    name: Ubuntu desktop example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DP2P_BUILD_TESTS=OFF
          -DP2P_BUILD_EXAMPLES=ON
          -DP2P_UART_DEBUG=OFF
          -DMICRONET_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --parallel --target micronet_chat

  arduino-esp32:
    name: Arduino ESP32 compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Compile tracked library examples
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/all_in_one_port_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/data_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/identity_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/mneta_wrapper_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/protocol_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/security_test
          arduino-cli compile --fqbn esp32:esp32:esp32 arduino/micronet/examples/transport_test

      - name: Compile top-level Arduino examples
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 examples/arduino_mesh_3nodes
          arduino-cli compile --fqbn esp32:esp32:esp32 examples/arduino_stun_probe

  esp-idf:
    name: ESP-IDF build (compile-only)
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build esp32_stun_probe
        working-directory: examples/esp32_stun_probe
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build

      - name: Build esp32_sensor
        working-directory: examples/esp32_sensor
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build
